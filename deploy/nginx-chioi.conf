# =============================================================================
# CHỊ ƠI! — Nginx config (frontend + API)
# Path: /etc/nginx/sites-available/chioi
# Placeholders __DOMAIN_FRONTEND__, __DOMAIN_API__, __NESTJS_PORT__, __APP_DIR__
# sẽ được thay tự động bởi deploy-chioi.sh.
# =============================================================================

# ---------- Frontend (HTML + Tailwind CDN + Vanilla JS) ----------
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN_FRONTEND__ www.__DOMAIN_FRONTEND__;

    root __APP_DIR__;
    index index.html khachhang/dangnhap.html;
    charset utf-8;

    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=(self)" always;

    # Cache static
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Default — serve khachhang/ root, fallback /khachhang/dangnhap.html
    location / {
        try_files $uri $uri/ /khachhang/dangnhap.html;
    }

    # 3 frontend modules (subpath)
    location /khachhang/ { try_files $uri $uri/ =404; }
    location /giupviec/  { try_files $uri $uri/ =404; }
    location /admin/     { try_files $uri $uri/ =404; }
    location /shared/    { try_files $uri $uri/ =404; }

    access_log /var/log/nginx/__DOMAIN_FRONTEND__.access.log;
    error_log  /var/log/nginx/__DOMAIN_FRONTEND__.error.log;
}

# ---------- API (NestJS) + WebSocket ----------
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN_API__;

    client_max_body_size 50M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy → NestJS
    location / {
        proxy_pass http://127.0.0.1:__NESTJS_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Webhook endpoint cần raw body (Casso/Sepay verify signature)
    location /api/payments/webhook {
        proxy_pass http://127.0.0.1:__NESTJS_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    access_log /var/log/nginx/__DOMAIN_API__.access.log;
    error_log  /var/log/nginx/__DOMAIN_API__.error.log;
}
