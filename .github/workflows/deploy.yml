name: Deploy to VPS

# Tự động deploy lên VPS chioi.vn khi push lên branch main hoặc fix/*
# YÊU CẦU SECRETS (Settings → Secrets and variables → Actions):
#   - VPS_HOST           : 45.119.83.233 (hoặc chioi.vn)
#   - VPS_USER           : root
#   - VPS_SSH_PORT       : 22
#   - VPS_SSH_PRIVATE_KEY: nội dung file private key (xem deploy/SETUP_GITHUB_DEPLOY.md)
#   - VPS_DEPLOY_PATH    : /opt/chioi (default)
#
# Workflow chạy: pull code → npm ci → build → prisma generate → pm2 restart → verify

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feature/**'
  workflow_dispatch:  # Cho phép trigger thủ công từ Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # KHÔNG cancel deploy đang chạy (tránh state corrupt)

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (sanity check chỉ — VPS sẽ git pull riêng)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show deployment info
        run: |
          echo "Deploying branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT || 22 }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/opt/chioi' }}
          BRANCH: ${{ github.ref_name }}
        run: |
          ssh -p $VPS_SSH_PORT $VPS_USER@$VPS_HOST bash -s <<EOF
            set -euo pipefail
            cd $DEPLOY_PATH

            echo "═══ [1/6] Pulling latest from $BRANCH ═══"
            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH

            echo "═══ [2/6] Backend: npm ci ═══"
            cd backend
            npm ci --prefer-offline --no-audit --no-fund

            echo "═══ [3/6] Prisma generate ═══"
            npx prisma generate --schema=prisma/schema.prisma

            echo "═══ [4/6] Build NestJS ═══"
            npm run build

            echo "═══ [5/6] Copy frontend → /var/www ═══"
            rm -rf /var/www/chioi.vn/* /var/www/app.chioi.vn/*
            cp -r ../frontend/* /var/www/chioi.vn/
            cp -r ../frontend/* /var/www/app.chioi.vn/
            chown -R www-data:www-data /var/www/chioi.vn /var/www/app.chioi.vn

            echo "═══ [6/6] PM2 restart + verify ═══"
            pm2 restart chioi-backend --update-env
            sleep 3
            pm2 list | grep chioi-backend
          EOF

      - name: Health check
        env:
          API_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # Đợi service stabilize
          sleep 5
          # Check qua HTTPS frontend domain (dùng chioi.vn)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://chioi.vn/api/docs --max-time 15 || echo "000")
          echo "Health check status: $STATUS"
          if [[ "$STATUS" != "200" && "$STATUS" != "401" ]]; then
            echo "❌ Health check failed (status=$STATUS)"
            exit 1
          fi
          echo "✅ Backend live"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed on $VPS_HOST. Check VPS logs: pm2 logs chioi-backend --lines 50"
