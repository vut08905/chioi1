<!DOCTYPE html>
<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chat với Tasker | Chị Ơi!</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "primary": "#a04100",
                    "primary-container": "#ff7e36",
                    "primary-fixed": "#ffdbcc",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#642600",
                    "secondary": "#b3272e",
                    "secondary-container": "#fc5d5d",
                    "on-secondary": "#ffffff",
                    "background": "#fcf9f8",
                    "surface": "#fcf9f8",
                    "surface-container": "#f0eded",
                    "surface-container-low": "#f6f3f2",
                    "surface-container-high": "#eae7e7",
                    "surface-container-highest": "#e4e2e1",
                    "surface-container-lowest": "#ffffff",
                    "on-surface": "#1b1c1c",
                    "on-surface-variant": "#584238",
                    "outline": "#8b7266",
                    "outline-variant": "#dfc0b3",
                    "error": "#ba1a1a",
                    "inverse-surface": "#303030"
                },
                "spacing": {
                    "sm": "12px", "lg": "24px", "xs": "8px", "base": "4px",
                    "container-padding": "20px", "md": "16px", "xl": "32px"
                },
                "fontFamily": {
                    "body-lg": ["Be Vietnam Pro"],
                    "title-sm": ["Be Vietnam Pro"],
                    "label-sm": ["Be Vietnam Pro"]
                },
                "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}]
                }
            },
        },
    }
</script>
<style>
    body { font-family: 'Be Vietnam Pro', sans-serif; }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .orange-gradient { background: linear-gradient(135deg, #ff7e36 0%, #a04100 100%); }
    .message-gradient { background: linear-gradient(135deg, #ff7e36 0%, #a04100 100%); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="text-on-surface min-h-screen flex flex-col relative bg-background">
<div class="absolute top-0 left-0 w-full h-[300px] z-0 pointer-events-none" style="background: linear-gradient(rgb(255, 126, 54) 0%, rgb(252, 249, 248) 100%);"></div>

<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-50 bg-transparent h-16 px-container-padding flex justify-between items-center">
<div class="flex items-center gap-3">
    <button onclick="history.back()" class="text-on-primary active:scale-95 transition-all" style="cursor:pointer">
        <span class="material-symbols-outlined text-[28px]">arrow_back</span>
    </button>
    <div class="flex items-center gap-2">
        <div class="relative">
            <div id="tasker-avatar-wrap" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-white/20 overflow-hidden">
                <span class="material-symbols-outlined text-outline text-[24px]">person</span>
            </div>
            <div id="online-dot" class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-primary rounded-full hidden"></div>
        </div>
        <div>
            <h1 id="tasker-name" class="text-on-primary font-title-sm text-[16px] leading-tight">Đang tải...</h1>
            <p id="tasker-status" class="text-on-primary/80 text-[11px]">Đang kết nối</p>
        </div>
    </div>
</div>
<button id="btn-call" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/20 backdrop-blur-md text-on-primary active:scale-95 transition-all">
    <span class="material-symbols-outlined">call</span>
</button>
</header>

<!-- Order Info Card (pinned) -->
<div id="order-card" class="sticky top-16 z-40 bg-white/90 backdrop-blur-sm px-container-padding py-3 shadow-sm flex items-center justify-between mx-md mt-[72px] rounded-xl border border-outline-variant/30 hidden">
    <div class="flex items-center gap-3">
        <div class="bg-primary p-2 rounded-lg">
            <span class="material-symbols-outlined text-on-primary text-[20px]">cleaning_services</span>
        </div>
        <span id="order-info-text" class="text-on-surface font-title-sm text-[14px]">Đơn hàng</span>
    </div>
    <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</div>

<!-- Chat Area -->
<main id="chat-area" class="flex-1 mt-4 mb-20 px-container-padding space-y-3 overflow-y-auto relative z-10 no-scrollbar">
    <!-- Timestamp -->
    <div class="flex justify-center my-lg">
        <span class="bg-surface-container-high text-on-surface-variant text-[11px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">Đang tải tin nhắn...</span>
    </div>
</main>

<!-- Message Input Bar -->
<footer class="fixed bottom-0 left-0 right-0 px-md py-3 z-50 bg-white/95 backdrop-blur-md border-t border-outline-variant/20">
<div class="flex items-center gap-2">
    <button id="btn-pick-image" class="w-10 h-10 flex items-center justify-center text-outline active:scale-95 transition-all">
        <span class="material-symbols-outlined">image</span>
    </button>
    <input type="file" id="image-picker" accept="image/*" class="hidden" />
    <div class="flex-1 h-10">
        <input id="msg-input" class="w-full h-full bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary-container text-body-lg px-4 placeholder:text-outline-variant" placeholder="Nhập tin nhắn..." type="text"/>
    </div>
    <button id="btn-send" class="w-10 h-10 flex items-center justify-center bg-primary text-on-primary rounded-full shadow-md active:scale-90 transition-all">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
    </button>
</div>
</footer>

<!-- ===== CALL OVERLAY ===== -->
<div id="call-overlay" class="hidden fixed inset-0 z-[200] bg-black/85 flex flex-col items-center justify-center">
    <div class="w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center mb-4 border-4 border-white/30 overflow-hidden">
        <span class="material-symbols-outlined text-outline text-[48px]">person</span>
    </div>
    <h2 id="call-name" class="text-white text-xl font-bold mb-2">Đang gọi...</h2>
    <p id="call-status" class="text-white/70 mb-8 text-sm">Đang chờ phản hồi</p>
    <button onclick="if(window.chiOiCall)chiOiCall.endCall()" class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-all">
        <span class="material-symbols-outlined text-white text-[32px]" style="font-variation-settings: 'FILL' 1">call_end</span>
    </button>
    <audio id="remote-audio" autoplay></audio>
</div>

<!-- ===== INCOMING CALL POPUP ===== -->
<div id="incoming-call-popup" class="hidden fixed bottom-24 left-4 right-4 z-[200] bg-gray-900 rounded-2xl p-4 shadow-2xl animate-bounce">
    <div class="flex items-center gap-3 mb-3">
        <div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center">
            <span class="material-symbols-outlined text-outline text-[28px]">person</span>
        </div>
        <div>
            <p class="text-white font-bold" id="incoming-name">Cuộc gọi đến</p>
            <p class="text-white/60 text-sm">📞 Cuộc gọi từ đơn hàng</p>
        </div>
    </div>
    <div class="flex gap-3">
        <button id="btn-reject-call" class="flex-1 py-3 bg-red-500 rounded-full text-white font-bold flex items-center justify-center gap-1 active:scale-95 transition-all">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">call_end</span> Từ chối
        </button>
        <button id="btn-accept-call" class="flex-1 py-3 bg-green-500 rounded-full text-white font-bold flex items-center justify-center gap-1 active:scale-95 transition-all">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">call</span> Nghe máy
        </button>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/webrtc.js"></script>
<script>
(async function() {
  if (!ChiOiAuth.requireAuth('dangnhap.html')) return;
  var user = ChiOiAuth.getUser();

  // Lấy params từ URL
  var params = new URLSearchParams(window.location.search);
  var orderId = params.get('orderId');
  var receiverId = params.get('receiverId');

  if (!orderId) {
    showToastMsg('⚠️ Thiếu thông tin đơn hàng');
    return;
  }

  var chatArea = document.getElementById('chat-area');
  var msgInput = document.getElementById('msg-input');
  var btnSend = document.getElementById('btn-send');
  var taskerNameEl = document.getElementById('tasker-name');
  var taskerStatusEl = document.getElementById('tasker-status');
  var orderCard = document.getElementById('order-card');
  var orderInfoText = document.getElementById('order-info-text');

  // ===== 1. Load thông tin đơn hàng =====
  try {
    var order = await apiFetch('/api/orders/' + orderId);
    // Hiện tên tasker thật
    var taskerName = (order.taskers && order.taskers.users && order.taskers.users.full_name) || 'Tasker';
    taskerNameEl.textContent = taskerName;
    taskerStatusEl.textContent = 'Đang trực tuyến';
    document.getElementById('online-dot').classList.remove('hidden');

    // Cập nhật avatar nếu có
    if (order.taskers && order.taskers.users && order.taskers.users.avatar_url) {
      var wrap = document.getElementById('tasker-avatar-wrap');
      wrap.innerHTML = '<img src="' + order.taskers.users.avatar_url + '" class="w-full h-full object-cover" alt="' + taskerName + '" />';
    }

    // Hiện order card
    var serviceName = (order.services && order.services.name) || 'Dịch vụ';
    var statusMap = { 'ACCEPTED': 'Đã nhận', 'IN_PROGRESS': 'Đang TH', 'TASKER_ARRIVED': 'Đã tới', 'COMPLETED': 'Xong', 'PENDING': 'Chờ' };
    orderInfoText.textContent = 'Đơn: ' + serviceName + ' · ' + (statusMap[order.status] || order.status);
    orderCard.classList.remove('hidden');

    // Lấy receiverId từ order nếu chưa có
    if (!receiverId && order.tasker_id) {
      receiverId = order.tasker_id;
    }
    // Update call overlay name
    document.getElementById('call-name').textContent = taskerName;
  } catch (e) {
    console.warn('[Chat] Không load được đơn hàng:', e.message);
    taskerNameEl.textContent = 'Tasker';
  }

  // ===== 2. Load lịch sử tin nhắn =====
  try {
    var messages = await apiFetch('/api/orders/chat/' + orderId);
    chatArea.innerHTML = '';

    // Timestamp header
    var now = new Date();
    var tsDiv = document.createElement('div');
    tsDiv.className = 'flex justify-center my-lg';
    tsDiv.innerHTML = '<span class="bg-surface-container-high text-on-surface-variant text-[11px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">HÔM NAY</span>';
    chatArea.appendChild(tsDiv);

    if (messages && messages.length > 0) {
      messages.forEach(function(msg) {
        appendMessage(msg, Number(msg.sender_id) === Number(user.user_id));
      });
    } else {
      var empty = document.createElement('div');
      empty.className = 'text-center py-12';
      empty.innerHTML = '<span class="material-symbols-outlined text-[48px] text-outline-variant">chat_bubble_outline</span><p class="text-on-surface-variant mt-2 text-sm">Bắt đầu trò chuyện</p>';
      chatArea.appendChild(empty);
    }
    scrollToBottom();
  } catch (e) {
    console.warn('[Chat] Không load được lịch sử:', e.message);
    chatArea.innerHTML = '<div class="text-center py-12"><p class="text-on-surface-variant text-sm">Không thể tải tin nhắn</p></div>';
  }

  // ===== 3. Kết nối Socket + join room =====
  var socket = connectSocket();
  if (socket) {
    socket.on('connect', function() {
      socket.emit('join_order_room', { orderId: parseInt(orderId) });
    });
    // Nếu đã connect rồi (race condition)
    if (socket.connected) {
      socket.emit('join_order_room', { orderId: parseInt(orderId) });
    }

    socket.on('joined_room', function(data) {
      console.log('[Chat] Đã join room:', data.roomName);
    });

    // Nhận tin nhắn realtime
    socket.on('receive_message', function(msg) {
      // Chỉ hiện tin của đối phương (tin mình gửi đã hiện rồi)
      if (Number(msg.sender_id) !== Number(user.user_id)) {
        // Xóa "empty" placeholder nếu có
        var emptyDiv = chatArea.querySelector('.text-center.py-12');
        if (emptyDiv) emptyDiv.remove();

        appendMessage(msg, false);
        scrollToBottom();
      }
    });

    // Confirm tin đã gửi
    socket.on('message_sent', function(msg) {
      // Đổi icon done → done_all cho tin cuối
      var allSent = chatArea.querySelectorAll('.msg-status-icon');
      if (allSent.length > 0) {
        allSent[allSent.length - 1].textContent = 'done_all';
      }
    });

    // ===== 4. WebRTC Call =====
    window.chiOiCall = new ChiOiCall(socket, user.user_id);

    // Nút gọi
    document.getElementById('btn-call').addEventListener('click', function() {
      if (!receiverId) { showToastMsg('⚠️ Không xác định được người nhận'); return; }
      chiOiCall.startCall(parseInt(orderId), parseInt(receiverId));
    });

    // Nút nhận/từ chối cuộc gọi
    document.getElementById('btn-accept-call').addEventListener('click', function() {
      if (chiOiCall.remoteUserId) chiOiCall.acceptCall(chiOiCall.remoteUserId);
    });
    document.getElementById('btn-reject-call').addEventListener('click', function() {
      if (chiOiCall.remoteUserId) chiOiCall.rejectCall(chiOiCall.remoteUserId);
    });
  }

  // ===== 5. Gửi tin nhắn =====
  function sendChatMessage() {
    var text = msgInput.value.trim();
    if (!text || !receiverId) return;

    // Xóa "empty" placeholder nếu có
    var emptyDiv = chatArea.querySelector('.text-center.py-12');
    if (emptyDiv) emptyDiv.remove();

    // Hiện trên UI ngay (optimistic)
    appendMessage({ content: text, sender_id: user.user_id, created_at: new Date().toISOString() }, true);
    scrollToBottom();

    // Gửi qua socket
    if (socket) {
      socket.emit('send_message', {
        orderId: parseInt(orderId),
        receiverId: parseInt(receiverId),
        content: text
      });
    }
    msgInput.value = '';
  }

  btnSend.addEventListener('click', sendChatMessage);
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendChatMessage();
  });

  // ===== 6. Gửi ảnh =====
  var btnPickImage = document.getElementById('btn-pick-image');
  var imagePicker = document.getElementById('image-picker');
  if (btnPickImage && imagePicker) {
    btnPickImage.addEventListener('click', function() { imagePicker.click(); });
    imagePicker.addEventListener('change', function() {
      var file = this.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) { showToastMsg('Chỉ chấp nhận file ảnh'); return; }
      if (file.size > 5 * 1024 * 1024) { showToastMsg('Ảnh tối đa 5MB'); return; }

      var reader = new FileReader();
      reader.onload = function(e) {
        appendImageMessage(e.target.result, true);
        scrollToBottom();
        showToastMsg('📷 Đã gửi ảnh');

        if (socket && orderId && receiverId) {
          socket.emit('send_message', {
            orderId: parseInt(orderId),
            receiverId: parseInt(receiverId),
            content: '[Hình ảnh]'
          });
        }
      };
      reader.readAsDataURL(file);
      this.value = '';
    });
  }

  // ===== Helper: Append message bubble =====
  function appendMessage(msg, isMine) {
    var div = document.createElement('div');
    var timeStr = msg.created_at ? formatTime(msg.created_at) : 'Vừa xong';

    if (isMine) {
      div.className = 'flex flex-col items-end gap-1';
      div.innerHTML = '<div class="message-gradient text-white p-3 rounded-2xl rounded-br-none shadow-md max-w-[80%]">' +
        '<p class="text-[15px] leading-relaxed">' + escapeHtml(msg.content) + '</p>' +
        '<div class="flex items-center justify-end gap-1 mt-1">' +
        '<p class="text-[10px] text-white/70">' + timeStr + '</p>' +
        '<span class="material-symbols-outlined text-[14px] text-white/80 msg-status-icon">done</span></div></div>';
    } else {
      div.className = 'flex items-end gap-2 max-w-[85%]';
      div.innerHTML = '<div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 bg-surface-container-high flex items-center justify-center">' +
        '<span class="material-symbols-outlined text-outline text-[16px]">person</span></div>' +
        '<div class="bg-surface-container-high text-on-surface p-3 rounded-2xl rounded-bl-none shadow-sm">' +
        '<p class="text-[15px] leading-relaxed">' + escapeHtml(msg.content) + '</p>' +
        '<p class="text-[10px] text-on-surface-variant mt-1">' + timeStr + '</p></div>';
    }
    chatArea.appendChild(div);
  }

  function appendImageMessage(src, isMine) {
    var div = document.createElement('div');
    if (isMine) {
      div.className = 'flex flex-col items-end gap-1';
      div.innerHTML = '<div class="message-gradient p-2 rounded-2xl rounded-br-none shadow-md max-w-[80%]">' +
        '<div class="rounded-xl overflow-hidden"><img src="' + src + '" class="w-48 h-32 object-cover" alt="Ảnh" /></div>' +
        '<div class="flex items-center justify-end gap-1 mt-1">' +
        '<p class="text-[10px] text-white/70">Vừa xong</p>' +
        '<span class="material-symbols-outlined text-[14px] text-white/80">done</span></div></div>';
    }
    chatArea.appendChild(div);
  }

  function scrollToBottom() {
    setTimeout(function() { chatArea.scrollTop = chatArea.scrollHeight; }, 100);
  }

  function formatTime(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>
</body></html>
