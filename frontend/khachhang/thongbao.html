<script src="../shared/api.js?v=20260514"></script>
<script>
(async function() {
  if (!ChiOiAuth.requireAuth('dangnhap.html')) return;

  var allNotifs = [];
  var activeTab = 'all';

  // ===== Build notifications from multiple sources =====
  async function loadNotifications() {
    var notifs = [];

    // 1. Load from wallet transactions
    try {
      var txs = await apiFetch('/api/wallets/transactions');
      if (txs && txs.length > 0) {
        txs.slice(0, 5).forEach(function(tx) {
          var type = (tx.type || '').toUpperCase();
          var icon = 'account_balance_wallet';
          var title = 'Biến động số dư';
          var body = '';
          if (type === 'DEPOSIT' || type === 'TOP_UP') {
            body = 'Bạn vừa nạp ' + formatVND(tx.amount) + ' vào ví Chị Ơi.';
          } else if (type === 'WITHDRAW') {
            body = 'Bạn đã rút ' + formatVND(tx.amount) + ' từ ví Chị Ơi.';
          } else {
            body = 'Giao dịch ' + formatVND(tx.amount) + ' đã được xử lý.';
          }
          notifs.push({ type: 'wallet', icon: icon, iconBg: 'bg-tertiary-container', iconText: 'text-on-tertiary', title: title, body: body, time: tx.created_at, unread: false, link: 'vivalichsu.html' });
        });
      }
    } catch (e) { console.warn('[Notif] Wallet:', e.message); }

    // 2. Load from orders
    try {
      var orders = await apiFetch('/api/orders/customer/history');
      if (orders && orders.length > 0) {
        orders.slice(0, 5).forEach(function(o) {
          var svcName = (o.services && o.services.name) ? o.services.name : 'Dịch vụ';
          var statusLabels = {
            'PENDING': 'đang chờ xử lý',
            'SEARCHING': 'đang tìm Tasker',
            'ACCEPTED': 'đã được nhận',
            'IN_PROGRESS': 'đang thực hiện',
            'COMPLETED': 'đã hoàn thành',
            'CANCELLED': 'đã bị hủy'
          };
          var statusText = statusLabels[o.status] || o.status;
          var isActive = o.status === 'IN_PROGRESS' || o.status === 'SEARCHING' || o.status === 'ACCEPTED';
          notifs.push({
            type: 'order', icon: 'local_shipping', iconBg: 'bg-primary-container', iconText: 'text-on-primary',
            title: svcName, body: 'Đơn hàng #' + o.order_id + ' ' + statusText + '.',
            time: o.updated_at || o.created_at, unread: isActive,
            link: 'theodoidon.html?orderId=' + o.order_id
          });
        });
      }
    } catch (e) { console.warn('[Notif] Orders:', e.message); }

    // 3. Static system + promo notifications
    notifs.push({ type: 'system', icon: 'info', iconBg: 'bg-surface-variant', iconText: 'text-on-surface-variant', title: 'Cập nhật hệ thống', body: 'Ứng dụng đã được cập nhật phiên bản mới nhất.', time: new Date(Date.now() - 86400000).toISOString(), unread: false });
    notifs.push({ type: 'promo', icon: 'sell', iconBg: 'bg-secondary-container/30', iconText: 'text-secondary', title: 'Khuyến mãi 20%', body: 'Nhập mã CHIOI20 để được giảm giá dịch vụ dọn nhà.', time: new Date(Date.now() - 3600000).toISOString(), unread: false });

    // Sort by time desc
    notifs.sort(function(a, b) { return new Date(b.time) - new Date(a.time); });
    return notifs;
  }

  function timeAgo(dateStr) {
    var d = new Date(dateStr);
    var now = new Date();
    var diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'Vừa xong';
    if (diff < 3600) return Math.floor(diff / 60) + ' phút trước';
    if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
    if (diff < 604800) return Math.floor(diff / 86400) + ' ngày trước';
    return d.toLocaleDateString('vi-VN');
  }

  function renderNotifs() {
    var list = document.getElementById('notif-list');
    var filtered = allNotifs.filter(function(n) {
      return activeTab === 'all' || n.type === activeTab;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<div class="mt-8 flex flex-col items-center opacity-40"><span class="material-symbols-outlined text-[48px] mb-2">notifications_off</span><p class="text-body-sm font-medium">Không có thông báo</p></div>';
      return;
    }

    list.innerHTML = '';
    filtered.forEach(function(n) {
      var div = document.createElement('div');
      div.className = 'flex gap-md p-md rounded-2xl transition-all active:scale-[0.98] ' + (n.unread ? 'bg-primary-fixed cursor-pointer' : 'bg-surface-container-low');
      if (n.link) div.style.cursor = 'pointer';
      div.innerHTML = '<div class="w-12 h-12 rounded-full ' + n.iconBg + ' flex items-center justify-center flex-shrink-0 ' + n.iconText + '">' +
        '<span class="material-symbols-outlined"' + (n.unread ? ' style="font-variation-settings: \'FILL\' 1;"' : '') + '>' + n.icon + '</span></div>' +
        '<div class="flex flex-col gap-1 flex-1">' +
        '<div class="flex justify-between items-start"><h3 class="font-title-sm text-on-surface text-[15px]">' + n.title + '</h3>' +
        (n.unread ? '<span class="w-2.5 h-2.5 bg-error rounded-full mt-1 flex-shrink-0"></span>' : '') + '</div>' +
        '<p class="text-body-sm text-on-surface-variant leading-tight">' + n.body + '</p>' +
        '<span class="text-xs text-outline font-medium mt-1">' + timeAgo(n.time) + '</span></div>';
      if (n.link) {
        div.addEventListener('click', function() { window.location.href = n.link; });
      }
      list.appendChild(div);
    });

    // Update badge
    var unreadCount = allNotifs.filter(function(n) { return n.unread; }).length;
    var badge = document.getElementById('notif-badge');
    if (badge) {
      badge.textContent = unreadCount;
      badge.style.display = unreadCount > 0 ? 'flex' : 'none';
    }
  }

  // ===== Tab click handlers =====
  document.querySelectorAll('#notif-tabs button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeTab = this.getAttribute('data-tab');
      document.querySelectorAll('#notif-tabs button').forEach(function(b) {
        b.className = b.getAttribute('data-tab') === activeTab
          ? 'tab-active flex-none px-6 py-2 rounded-full font-title-sm text-sm active:scale-95 transition-all'
          : 'tab-inactive flex-none px-6 py-2 rounded-full font-title-sm text-sm active:scale-95 transition-all';
      });
      renderNotifs();
    });
  });

  // ===== Mark all read =====
  document.getElementById('mark-all-read').addEventListener('click', function() {
    allNotifs.forEach(function(n) { n.unread = false; });
    renderNotifs();
    showToastMsg('✅ Đã đánh dấu tất cả đã đọc');
  });

  // ===== Load =====
  allNotifs = await loadNotifications();
  renderNotifs();
})();
</script>
