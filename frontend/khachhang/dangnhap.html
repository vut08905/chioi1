<script>
// TC-KH01-021: Auto redirect nếu đã đăng nhập
(function() {
    var token = localStorage.getItem('chioi_token');
    var user = localStorage.getItem('chioi_user');
    if (token && user) {
        try {
            var userData = JSON.parse(user);
            if (userData && userData.role === 'CUSTOMER') {
                window.location.replace('trangchu.html');
                return;
            }
        } catch(e) {}
    }
})();
// ============================================================
// TC-KH01-007,011: Real-time phone input — chỉ cho nhập số, không khoảng trắng
// ============================================================
document.getElementById('phoneInput').addEventListener('input', function() {
    var cleaned = this.value.replace(/[^\d]/g, '');
    if (cleaned.length > 10) cleaned = cleaned.substring(0, 10);
    if (cleaned !== this.value) this.value = cleaned;
    document.getElementById('phoneError').style.display = 'none';
});
document.getElementById('phoneInput').addEventListener('paste', function() {
    var self = this;
    setTimeout(function() {
        self.value = self.value.replace(/[^\d]/g, '').substring(0, 10);
    }, 0);
});

// TC-KH01-012: Chặn khoảng trắng đầu/cuối ở mật khẩu — lọc real-time
document.getElementById('passwordInput').addEventListener('input', function() {
    // Trim spaces at start/end while typing
    if (this.value !== this.value.trim()) {
        this.value = this.value.trim();
    }
});

// ============================================================
// VALIDATION
// ============================================================
function validateLoginPhone(phone) {
    if (!phone) return 'Vui lòng nhập số điện thoại.';
    if (/[^\d]/.test(phone)) return 'Số điện thoại chỉ được chứa chữ số.';
    if (phone.length < 10) return 'Số điện thoại phải có 10 chữ số.';
    if (phone.length > 10) return 'Số điện thoại không được vượt quá 10 chữ số.';
    if (!/^0\d{9}$/.test(phone)) return 'Số điện thoại phải bắt đầu bằng số 0.';
    return null;
}

// ============================================================
// LOGIN HANDLER
// ============================================================
async function handleLogin() {
    var phone = document.getElementById('phoneInput').value.trim();
    var pass = document.getElementById('passwordInput').value.trim();
    var errorEl = document.getElementById('errorMsg');
    var phoneErr = document.getElementById('phoneError');
    var loginBtn = document.getElementById('loginBtn');

    errorEl.style.display = 'none';
    phoneErr.style.display = 'none';

    // TC-KH01-007,008,009: Validate phone format
    var phoneValidErr = validateLoginPhone(phone);
    if (phoneValidErr) {
        phoneErr.textContent = phoneValidErr;
        phoneErr.style.display = 'block';
        return;
    }

    if (!pass) {
        errorEl.textContent = 'Vui lòng nhập mật khẩu.';
        errorEl.style.display = 'block';
        return;
    }

    // Disable button + show loading
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="flex items-center justify-center gap-2"><svg class="animate-spin w-5 h-5 text-white" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span class="text-white text-[15px] font-bold">Đang đăng nhập...</span></span>';

    try {
        var data = await apiFetch('/api/auth/login', {
            method: 'POST',
            body: { phone: phone, password: pass }
        });

        // Bug #16 FIX: Kiểm tra role TRƯỚC khi lưu token — tránh nhiễm session
        if (data && data.user && data.user.role === 'CUSTOMER') {
            ChiOiAuth.saveLogin(data);
            window.location.href = 'trangchu.html';
        } else {
            // KHÔNG saveLogin — không lưu token của role khác
            errorEl.textContent = 'Tài khoản không thuộc hệ thống khách hàng. Vui lòng đăng nhập đúng cổng.';
            errorEl.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<span class="text-white text-[15px] font-bold tracking-wide">ĐĂNG NHẬP</span>';
            return;
        }
    } catch (err) {
        // TC-KH01-002,003,010,019: Dịch thông báo lỗi sang tiếng Việt
        var msg = err.message || '';
        if (msg.includes('hết hạn') || msg.toLowerCase().includes('unauthorized') || msg.toLowerCase().includes('invalid') || msg.includes('Sai số điện thoại')) {
            msg = 'Số điện thoại chưa đăng ký hoặc sai mật khẩu. Vui lòng kiểm tra lại hoặc <a href="dangky.html" class="text-primary font-bold underline">đăng ký tài khoản mới</a>.';
        } else if (msg.toLowerCase().includes('not found') || msg.toLowerCase().includes('không tồn tại') || msg.toLowerCase().includes('not exist')) {
            msg = 'Số điện thoại chưa được đăng ký. <a href="dangky.html" class="text-primary font-bold underline">Đăng ký ngay</a>.';
        } else if (msg.toLowerCase().includes('tạm khóa') || msg.toLowerCase().includes('locked') || msg.toLowerCase().includes('blocked')) {
            msg = 'Tài khoản đã bị tạm khóa. Vui lòng liên hệ CSKH.';
        } else if (msg.toLowerCase().includes('fetch') || msg.toLowerCase().includes('kết nối')) {
            msg = 'Không có kết nối mạng. Vui lòng kiểm tra Internet và thử lại.';
        } else if (!msg) {
            msg = 'Đăng nhập thất bại. Vui lòng thử lại.';
        }
        errorEl.innerHTML = msg;
        errorEl.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span class="text-white text-[15px] font-bold tracking-wide">ĐĂNG NHẬP</span>';
    }
}

// Enter key support
document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
});
document.getElementById('phoneInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('passwordInput').focus();
});
</script>
