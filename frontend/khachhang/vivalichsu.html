<script src="../shared/api.js"></script>
<script>
(async function() {
  if (!ChiOiAuth.requireAuth('dangnhap.html')) return;

  var allTransactions = [];
  var currentFilter = 'all';

  // ===== Load wallet balance =====
  try {
    var wallet = await apiFetch('/api/wallets/balance');
    var balanceEl = document.getElementById('wallet-balance');
    if (wallet && wallet.balance !== undefined) {
      balanceEl.textContent = formatVND(wallet.balance);
    }
  } catch (e) {
    console.warn('[Ví] Không load được số dư:', e.message);
  }

  // ===== Lỗi 12 FIX: Load transactions từ DB =====
  try {
    var txData = await apiFetch('/api/wallets/transactions');
    if (txData && Array.isArray(txData)) {
      allTransactions = txData;
    } else if (txData && txData.transactions) {
      allTransactions = txData.transactions;
    }
  } catch (e) {
    console.warn('[Ví] Không load được lịch sử GD:', e.message);
  }

  // ===== Render transactions =====
  function renderTransactions(filter) {
    var list = document.getElementById('transaction-list');
    var emptyState = document.getElementById('empty-state');
    list.innerHTML = '';

    var filtered = allTransactions;
    if (filter && filter !== 'all') {
      filtered = allTransactions.filter(function(tx) {
        return tx.tx_type === filter || tx.type === filter;
      });
    }

    if (filtered.length === 0) {
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    filtered.forEach(function(tx) {
      var type = tx.tx_type || tx.type || '';
      var amount = tx.amount || 0;
      var isIncome = type === 'DEPOSIT' || type === 'REFUND' || type === 'BONUS';
      var icon = 'receipt';
      var iconColor = 'text-primary';
      var iconBg = 'bg-primary-container/20';
      var label = type;

      if (type === 'DEPOSIT') { icon = 'account_balance_wallet'; label = 'Nạp tiền'; iconColor = 'text-tertiary'; iconBg = 'bg-tertiary-container/20'; }
      else if (type === 'PAYMENT') { icon = 'shopping_cart'; label = 'Thanh toán dịch vụ'; }
      else if (type === 'REFUND') { icon = 'history'; label = 'Hoàn tiền'; iconColor = 'text-secondary'; iconBg = 'bg-secondary-container/20'; }
      else if (type === 'WITHDRAWAL') { icon = 'download'; label = 'Rút tiền'; iconColor = 'text-error'; iconBg = 'bg-error-container/20'; }
      else if (type === 'BONUS') { icon = 'redeem'; label = 'Thưởng'; iconColor = 'text-primary'; }

      var dateStr = '';
      if (tx.created_at) {
        var d = new Date(tx.created_at);
        dateStr = d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + ' - ' + d.toLocaleDateString('vi-VN');
      }

      var statusText = tx.status || 'COMPLETED';
      var statusClass = 'text-tertiary bg-tertiary-container/10';
      if (statusText === 'PENDING') statusClass = 'text-yellow-700 bg-yellow-100';
      else if (statusText === 'FAILED') statusClass = 'text-error bg-error-container/20';

      var statusLabel = statusText === 'COMPLETED' ? 'Thành công' : statusText === 'PENDING' ? 'Đang xử lý' : statusText === 'FAILED' ? 'Thất bại' : statusText;

      var amountText = (isIncome ? '+ ' : '- ') + formatVND(Math.abs(amount));
      var amountColor = isIncome ? 'text-primary' : 'text-error';

      var div = document.createElement('div');
      div.className = 'bg-surface-container-lowest p-md rounded-2xl shadow-sm border border-surface-container flex items-center gap-md';
      div.innerHTML = '<div class="w-12 h-12 rounded-full ' + iconBg + ' flex items-center justify-center ' + iconColor + '"><span class="material-symbols-outlined">' + icon + '</span></div>' +
        '<div class="flex-1"><h3 class="text-body-lg font-bold text-on-surface">' + label + '</h3><p class="text-body-sm text-on-surface-variant">' + dateStr + '</p>' +
        '<span class="text-[11px] font-bold ' + statusClass + ' px-2 py-0.5 rounded-full uppercase tracking-wider">' + statusLabel + '</span></div>' +
        '<div class="text-right"><span class="text-body-lg font-bold ' + amountColor + '">' + amountText + '</span></div>';
      list.appendChild(div);
    });
  }

  // ===== Lỗi 13 FIX: Filter chips hoạt động =====
  var filterChips = document.querySelectorAll('.filter-chip');
  filterChips.forEach(function(chip) {
    chip.addEventListener('click', function() {
      // Reset all chips
      filterChips.forEach(function(c) {
        c.className = 'filter-chip bg-surface-container-low text-on-surface-variant border border-outline-variant/30 px-5 py-2 rounded-full text-label-sm font-bold flex-shrink-0 cursor-pointer';
      });
      // Activate clicked chip
      chip.className = 'filter-chip active bg-primary text-on-primary px-5 py-2 rounded-full text-label-sm font-bold flex-shrink-0 cursor-pointer shadow-sm';
      currentFilter = chip.getAttribute('data-type');
      renderTransactions(currentFilter);
    });
  });

  // Initial render
  renderTransactions('all');

  // ===== Withdraw button =====
  document.getElementById('withdraw-btn').addEventListener('click', function() {
    showToastMsg('Chức năng rút tiền đang phát triển');
  });
})();
</script>
