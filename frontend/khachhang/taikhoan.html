<script>
(async function() {
  if (!ChiOiAuth.requireAuth('dangnhap.html')) return;

  // ===== Lỗi 11 FIX: Hiển thị đúng thông tin user =====
  var user = ChiOiAuth.getUser();
  if (user) {
    document.getElementById('user-name').textContent = user.full_name || 'Chưa cập nhật';
    document.getElementById('user-phone').textContent = user.phone || '...';
    // Avatar: hiển thị chữ cái đầu
    var avatarEl = document.getElementById('user-avatar');
    if (user.full_name) {
      var initials = user.full_name.split(' ').map(function(w) { return w[0]; }).join('').substring(0, 2).toUpperCase();
      avatarEl.innerHTML = initials;
    }
    
    // Gọi API lấy dữ liệu mới nhất từ backend
    try {
      var freshUser = await apiFetch('/api/users/profile');
      if (freshUser) {
        user = Object.assign(user, freshUser);
        localStorage.setItem('chioi_user', JSON.stringify(user));
        document.getElementById('user-name').textContent = user.full_name || 'Chưa cập nhật';
        document.getElementById('user-phone').textContent = user.phone || '...';
        if (user.full_name) {
          avatarEl.innerHTML = user.full_name.split(' ').map(function(w) { return w[0]; }).join('').substring(0, 2).toUpperCase();
        }
      }
    } catch (e) {
      console.warn('Không thể tải hồ sơ mới:', e);
    }
  }

  // ===== Lỗi 4+11 FIX: Chỉnh sửa hồ sơ - đầy đủ giới tính, email, địa chỉ =====
  document.getElementById('edit-profile-btn').addEventListener('click', function() {
    showModal('Chỉnh sửa hồ sơ', 
      '<div class="space-y-4">' +
      '<div><label class="text-body-sm text-on-surface-variant block mb-1">Họ và tên</label>' +
      '<input id="edit-name" type="text" value="' + (user ? user.full_name || '' : '') + '" class="w-full p-3 rounded-xl border border-outline-variant bg-surface-container-low focus:ring-2 focus:ring-primary-container text-body-lg" /></div>' +
      '<div><label class="text-body-sm text-on-surface-variant block mb-1">Số điện thoại</label>' +
      '<input type="tel" value="' + (user ? user.phone || '' : '') + '" class="w-full p-3 rounded-xl border border-outline-variant bg-surface-container-high text-body-lg text-on-surface-variant" disabled />' +
      '<p class="text-[11px] text-on-surface-variant mt-1">Đổi SĐT cần xác thực OTP</p></div>' +
      '<div><label class="text-body-sm text-on-surface-variant block mb-2">Giới tính</label>' +
      '<div id="gender-group" class="flex gap-2">' +
      '<label class="flex-1 cursor-pointer"><input type="radio" name="edit-gender" value="male" class="sr-only peer"' + (user && user.gender === 'male' ? ' checked' : '') + '><div class="text-center py-3 rounded-xl border-2 border-outline-variant text-body-lg peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-primary peer-checked:font-bold transition-all active:scale-95">Nam</div></label>' +
      '<label class="flex-1 cursor-pointer"><input type="radio" name="edit-gender" value="female" class="sr-only peer"' + (user && user.gender === 'female' ? ' checked' : '') + '><div class="text-center py-3 rounded-xl border-2 border-outline-variant text-body-lg peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-primary peer-checked:font-bold transition-all active:scale-95">Nữ</div></label>' +
      '<label class="flex-1 cursor-pointer"><input type="radio" name="edit-gender" value="other" class="sr-only peer"' + (user && user.gender === 'other' ? ' checked' : '') + '><div class="text-center py-3 rounded-xl border-2 border-outline-variant text-body-lg peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-primary peer-checked:font-bold transition-all active:scale-95">Khác</div></label>' +
      '</div></div>' +
      '<div><label class="text-body-sm text-on-surface-variant block mb-1">Email</label>' +
      '<input id="edit-email" type="email" value="' + (user ? user.email || '' : '') + '" placeholder="email@example.com" class="w-full p-3 rounded-xl border border-outline-variant bg-surface-container-low focus:ring-2 focus:ring-primary-container text-body-lg" /></div>' +
      '<div><label class="text-body-sm text-on-surface-variant block mb-1">Địa chỉ nhà</label>' +
      '<div class="flex gap-2">' +
      '<input id="edit-address" type="text" value="' + (user ? user.address || '' : '') + '" placeholder="VD: Căn A1-2003, Vinhomes" class="flex-1 p-3 rounded-xl border border-outline-variant bg-surface-container-low focus:ring-2 focus:ring-primary-container text-body-lg" />' +
      '<button id="btn-gps-location" type="button" class="p-3 rounded-xl bg-primary text-white active:scale-95 transition-all flex items-center justify-center shrink-0" title="Lấy vị trí hiện tại"><span class="material-symbols-outlined text-[20px]">my_location</span></button></div>' +
      '<input id="edit-lat" type="hidden" value="' + (user ? user.latitude || '' : '') + '" />' +
      '<input id="edit-lng" type="hidden" value="' + (user ? user.longitude || '' : '') + '" />' +
      '<p id="gps-status" class="text-[11px] text-on-surface-variant mt-1">Bấm 📍 để lấy vị trí GPS chính xác</p></div>' +
      '<button id="save-profile-btn" class="orange-gradient w-full py-3 rounded-xl text-white font-bold active:scale-95 transition-all">Lưu thay đổi</button>' +
      '</div>',
      function() {
        document.getElementById('save-profile-btn').addEventListener('click', async function() {
          var newName = document.getElementById('edit-name').value.trim();
          var newGender = (document.querySelector('input[name="edit-gender"]:checked') || {}).value || '';
          var newEmail = document.getElementById('edit-email').value.trim();
          var newAddress = document.getElementById('edit-address').value.trim();
          if (!newName) { showToastMsg('Vui lòng nhập họ tên'); return; }
          try {
            var result = await apiFetch('/api/users/profile', { method: 'PUT', body: { full_name: newName, gender: newGender, email: newEmail, address: newAddress } });
            // Update local user from API response
            user.full_name = result.full_name || newName;
            user.gender = result.gender || newGender;
            user.email = result.email || newEmail;
            user.address = result.address || newAddress;
            // Lưu lat/lng vào localStorage
            var lat = document.getElementById('edit-lat').value;
            var lng = document.getElementById('edit-lng').value;
            if (lat) user.latitude = lat;
            if (lng) user.longitude = lng;
            localStorage.setItem('chioi_user', JSON.stringify(user));
            document.getElementById('user-name').textContent = user.full_name;
            closeModal();
            showToastMsg('✅ Cập nhật hồ sơ thành công');
          } catch (e) { showToastMsg('❌ ' + e.message); }
        });

        // Bug 1 FIX: GPS location button
        document.getElementById('btn-gps-location').addEventListener('click', function() {
          var statusEl = document.getElementById('gps-status');
          if (!navigator.geolocation) {
            if (statusEl) statusEl.textContent = '❌ Trình duyệt không hỗ trợ GPS';
            return;
          }
          if (statusEl) statusEl.textContent = '⏳ Đang lấy vị trí GPS...';
          navigator.geolocation.getCurrentPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            document.getElementById('edit-lat').value = lat;
            document.getElementById('edit-lng').value = lng;
            if (statusEl) statusEl.textContent = '📍 GPS: ' + lat.toFixed(6) + ', ' + lng.toFixed(6);
            // Reverse geocode via Nominatim
            fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng + '&zoom=18&addressdetails=1')
              .then(function(r) { return r.json(); })
              .then(function(data) {
                if (data && data.display_name) {
                  document.getElementById('edit-address').value = data.display_name;
                  if (statusEl) statusEl.textContent = '✅ Đã cập nhật địa chỉ từ GPS';
                }
              })
              .catch(function() {
                if (statusEl) statusEl.textContent = '📍 GPS OK nhưng không lấy được tên đường';
              });
          }, function(err) {
            if (statusEl) statusEl.textContent = '❌ Không lấy được vị trí: ' + err.message;
          }, { enableHighAccuracy: true, timeout: 10000 });
        });
      }
    );
  });

  // ===== Lỗi 15 FIX: Các nút CSKH, Cài đặt, Bảo mật, Xóa TK =====
  document.getElementById('btn-cskh').addEventListener('click', function() {
    showModal('Liên hệ CSKH',
      '<div class="space-y-4 text-center">' +
      '<span class="material-symbols-outlined text-[48px] text-primary">support_agent</span>' +
      '<p class="text-body-lg font-bold">Hỗ trợ khách hàng 24/7</p>' +
      '<p class="text-body-sm text-on-surface-variant">Hotline: <a href="tel:19001234" class="text-primary font-bold">1900 1234</a></p>' +
      '<p class="text-body-sm text-on-surface-variant">Email: <a href="mailto:support@chioi.vn" class="text-primary font-bold">support@chioi.vn</a></p>' +
      '<button onclick="window.location.href=\'chatvoitasker.html\'" class="orange-gradient w-full py-3 rounded-xl text-white font-bold active:scale-95 transition-all mt-2">Chat với CSKH</button></div>'
    );
  });

  document.getElementById('btn-settings').addEventListener('click', function() {
    showModal('Cài đặt',
      '<div class="space-y-4">' +
      '<div class="flex items-center justify-between p-3 bg-surface-container-low rounded-xl"><span class="text-body-lg">Thông báo đẩy</span><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" checked class="sr-only peer"><div class="w-11 h-6 bg-outline-variant rounded-full peer peer-checked:bg-primary-container after:content-[\'\'] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></label></div>' +
      '<div class="flex items-center justify-between p-3 bg-surface-container-low rounded-xl"><span class="text-body-lg">Thông báo SMS</span><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" class="sr-only peer"><div class="w-11 h-6 bg-outline-variant rounded-full peer peer-checked:bg-primary-container after:content-[\'\'] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></label></div>' +
      '<div class="flex items-center justify-between p-3 bg-surface-container-low rounded-xl"><span class="text-body-lg">Ngôn ngữ</span><span class="text-primary font-bold">Tiếng Việt</span></div></div>'
    );
  });

  // Lỗi 6 FIX: Bảo mật - đổi mật khẩu + đăng xuất tất cả thiết bị
  document.getElementById('btn-security').addEventListener('click', function() {
    showModal('Bảo mật & Quyền riêng tư',
      '<div class="space-y-4">' +
      '<button id="btn-change-pw" class="w-full flex items-center justify-between p-3 bg-surface-container-low rounded-xl hover:bg-surface-container transition-colors"><span class="text-body-lg">Đổi mật khẩu</span><span class="material-symbols-outlined text-outline">chevron_right</span></button>' +
      '<div class="flex items-center justify-between p-3 bg-surface-container-low rounded-xl"><span class="text-body-lg">Xác thực 2 lớp (2FA)</span><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" class="sr-only peer"><div class="w-11 h-6 bg-outline-variant rounded-full peer peer-checked:bg-primary-container after:content-[\'\'] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div></label></div>' +
      '<button id="btn-logout-all" class="w-full flex items-center justify-between p-3 bg-surface-container-low rounded-xl hover:bg-surface-container transition-colors"><span class="text-body-lg">Đăng xuất tất cả thiết bị</span><span class="material-symbols-outlined text-outline">chevron_right</span></button></div>',
      function() {
        document.getElementById('btn-change-pw').addEventListener('click', function() {
          closeModal();
          showModal('Đổi mật khẩu',
            '<div class="space-y-4">' +
            '<div><label class="text-body-sm text-on-surface-variant block mb-1">Mật khẩu hiện tại</label><input id="pw-current" type="password" class="w-full p-3 rounded-xl border border-outline-variant bg-surface-container-low text-body-lg" placeholder="Nhập mật khẩu cũ" /></div>' +
            '<div><label class="text-body-sm text-on-surface-variant block mb-1">Mật khẩu mới</label><input id="pw-new" type="password" class="w-full p-3 rounded-xl border border-outline-variant bg-surface-container-low text-body-lg" placeholder="Nhập mật khẩu mới" /></div>' +
            '<div><label class="text-body-sm text-on-surface-variant block mb-1">Xác nhận mật khẩu mới</label><input id="pw-confirm" type="password" class="w-full p-3 rounded-xl border border-outline-variant bg-surface-container-low text-body-lg" placeholder="Nhập lại mật khẩu mới" /></div>' +
            '<button id="save-pw-btn" class="orange-gradient w-full py-3 rounded-xl text-white font-bold active:scale-95 transition-all">Đổi mật khẩu</button></div>',
            function() {
              document.getElementById('save-pw-btn').addEventListener('click', async function() {
                var cur = document.getElementById('pw-current').value;
                var np = document.getElementById('pw-new').value;
                var cf = document.getElementById('pw-confirm').value;
                if (!cur || !np) { showToastMsg('Vui lòng nhập đầy đủ'); return; }
                if (np.length < 6) { showToastMsg('Mật khẩu mới ít nhất 6 ký tự'); return; }
                if (np !== cf) { showToastMsg('Mật khẩu xác nhận không khớp'); return; }
                try { await apiFetch('/api/auth/change-password', { method: 'POST', body: { current_password: cur, new_password: np } }); closeModal(); showToastMsg('✅ Đổi mật khẩu thành công'); }
                catch (e) { showToastMsg('❌ ' + e.message); }
              });
            }
          );
        });
        document.getElementById('btn-logout-all').addEventListener('click', function() {
          closeModal();
          showModal('Đăng xuất tất cả thiết bị',
            '<div class="space-y-4 text-center">' +
            '<span class="material-symbols-outlined text-[48px] text-yellow-500">devices</span>' +
            '<p class="text-body-lg font-bold">Bạn có chắc chắn?</p>' +
            '<p class="text-body-sm text-on-surface-variant">Tất cả phiên đăng nhập trên các thiết bị khác sẽ bị kết thúc.</p>' +
            '<div class="flex gap-3 mt-4"><button onclick="closeModal()" class="flex-1 py-3 rounded-xl border-2 border-outline-variant text-on-surface-variant font-bold active:scale-95">Hủy</button>' +
            '<button id="confirm-logout-all" class="flex-1 py-3 rounded-xl bg-error text-white font-bold active:scale-95">Đăng xuất tất cả</button></div></div>',
            function() { document.getElementById('confirm-logout-all').addEventListener('click', function() { closeModal(); ChiOiAuth.logout('dangnhap.html'); }); }
          );
        });
      }
    );
  });

  document.getElementById('btn-delete-account').addEventListener('click', function() {
    showModal('Xóa tài khoản',
      '<div class="space-y-4 text-center">' +
      '<span class="material-symbols-outlined text-[48px] text-error">warning</span>' +
      '<p class="text-body-lg font-bold text-error">Bạn có chắc chắn muốn xóa tài khoản?</p>' +
      '<p class="text-body-sm text-on-surface-variant">Hành động này không thể hoàn tác. Tất cả dữ liệu sẽ bị xóa sau 30 ngày.</p>' +
      '<div class="flex gap-3 mt-4"><button onclick="closeModal()" class="flex-1 py-3 rounded-xl border-2 border-outline-variant text-on-surface-variant font-bold active:scale-95">Hủy</button>' +
      '<button class="flex-1 py-3 rounded-xl bg-error text-white font-bold active:scale-95">Xác nhận xóa</button></div></div>'
    );
  });

  // ===== Đăng xuất =====
  document.getElementById('logout-btn').addEventListener('click', function() {
    ChiOiAuth.logout('dangnhap.html');
  });

  // ===== Modal helper =====
  function showModal(title, contentHTML, onRender) {
    closeModal();
    var overlay = document.createElement('div');
    overlay.id = 'modal-overlay';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = '<div class="modal-content"><div class="flex justify-between items-center mb-4"><h2 class="text-title-sm font-bold">' + title + '</h2><button onclick="closeModal()" class="text-outline"><span class="material-symbols-outlined">close</span></button></div><div>' + contentHTML + '</div></div>';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
    document.body.appendChild(overlay);
    if (onRender) onRender();
  }
})();

function closeModal() {
  var m = document.getElementById('modal-overlay');
  if (m) m.remove();
}
</script>
</body></html>
