<script src="../shared/api.js?v=20260514"></script>
<script>
(async function() {
  if (!ChiOiAuth.requireAuth('dangnhaptasker.html')) return;

  var ordersList = document.querySelector('.flex.flex-col.gap-md');
  if (!ordersList) return;

  showLoading();
  try {
    var orders = await apiFetch('/api/taskers/history');
    hideLoading();

    if (!orders || orders.length === 0) {
      ordersList.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-[48px] text-outline-variant">inbox</span><p class="text-on-surface-variant mt-2">Chưa có đơn hàng nào</p></div>';
      return;
    }

    // Clear static cards
    ordersList.innerHTML = '';

    // Bug 5 FIX (report14): Lưu tất cả đơn hàng để filter sau
    var allOrders = orders;
    var currentMonthFilter = 'all'; // 'all', 'this_month', 'last_month'
    var currentServiceFilter = 'all'; // 'all' or service name
    var currentRatingFilter = 'all'; // 'all', 'rated', 'unrated'

    // Lấy danh sách dịch vụ duy nhất
    var uniqueServices = [];
    orders.forEach(function(o) {
      var sName = (o.service && o.service.name) || (o.services && o.services.name) || 'Dịch vụ';
      if (uniqueServices.indexOf(sName) === -1) uniqueServices.push(sName);
    });

    var statusMap = {
      'COMPLETED': { label: 'Hoàn thành', bg: 'bg-green-100', text: 'text-green-700' },
      'IN_PROGRESS': { label: 'Đang thực hiện', bg: 'bg-blue-100', text: 'text-blue-700' },
      'PENDING': { label: 'Chờ xử lý', bg: 'bg-yellow-100', text: 'text-yellow-700' },
      'CANCELLED': { label: 'Đã hủy', bg: 'bg-red-100', text: 'text-red-700' },
      'ACCEPTED': { label: 'Đã nhận', bg: 'bg-blue-100', text: 'text-blue-700' },
      'TASKER_ARRIVED': { label: 'Đã tới nơi', bg: 'bg-blue-100', text: 'text-blue-700' }
    };

    // Bug 5 FIX (report14): Render function dùng lại khi filter
    function renderOrders(filteredOrders) {
      ordersList.innerHTML = '';
      if (filteredOrders.length === 0) {
        ordersList.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-[48px] text-outline-variant">filter_alt_off</span><p class="text-on-surface-variant mt-2">Không có đơn hàng phù hợp</p></div>';
        return;
      }
      filteredOrders.forEach(function(order) {
        var s = statusMap[order.status] || statusMap['PENDING'];
        var serviceName = (order.service && order.service.name) || (order.services && order.services.name) || 'Dịch vụ';
        var customerName = (order.customer && order.customer.full_name) || (order.customers && order.customers.users && order.customers.users.full_name) || 'Khách hàng';
        var rating = order.review ? order.review.rating : 0;
        var comment = order.review ? order.review.comment : '';
        var starStr = '';
        for (var i = 0; i < rating; i++) starStr += '⭐';

        var card = document.createElement('div');
        card.className = 'order-card bg-surface-container-lowest rounded-xl p-md flex flex-col gap-3 cursor-pointer active:scale-[0.98] transition-transform';
        card.innerHTML =
          '<div class="flex justify-between items-start">' +
            '<div><h3 class="text-title-sm font-title-sm text-on-surface">' + serviceName + '</h3>' +
            '<p class="text-body-sm text-on-surface-variant flex items-center gap-1 mt-1"><span class="material-symbols-outlined text-[14px]">schedule</span>' + formatDateTime(order.scheduled_time) + '</p></div>' +
            '<span class="' + s.bg + ' ' + s.text + ' px-3 py-1 rounded-full text-label-caps font-bold">' + s.label + '</span></div>' +
          '<div class="flex items-center justify-between border-t border-dashed border-outline-variant pt-3">' +
            '<span class="text-headline-md font-headline-md text-primary">' + formatVND(order.total_price) + '</span>' +
            '<div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary text-[20px]">person</span>' +
            '<span class="text-body-sm text-on-surface-variant">' + customerName + '</span></div></div>' +
          (rating > 0 ? '<div class="bg-surface-container-low rounded-lg p-3 mt-1"><p class="text-body-sm text-on-surface flex items-center gap-1 italic"><span class="text-yellow-500 font-bold tracking-tight">' + starStr + '</span>"' + (comment || 'Tốt') + '"</p></div>' : '');

        card.addEventListener('click', function() { showTaskerOrderDetail(order, s, serviceName, customerName); });
        ordersList.appendChild(card);
      });
    }

    function applyFilters() {
      var result = allOrders;
      // Filter theo tháng
      if (currentMonthFilter === 'this_month') {
        var now = new Date();
        result = result.filter(function(o) {
          var d = new Date(o.created_at);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        });
      } else if (currentMonthFilter === 'last_month') {
        var now = new Date();
        var lastMonth = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
        var lastYear = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
        result = result.filter(function(o) {
          var d = new Date(o.created_at);
          return d.getMonth() === lastMonth && d.getFullYear() === lastYear;
        });
      }
      // Filter theo dịch vụ
      if (currentServiceFilter !== 'all') {
        result = result.filter(function(o) {
          var sName = (o.service && o.service.name) || (o.services && o.services.name) || 'Dịch vụ';
          return sName === currentServiceFilter;
        });
      }
      // Filter theo đánh giá
      if (currentRatingFilter === 'rated') {
        result = result.filter(function(o) { return o.review && o.review.rating > 0; });
      } else if (currentRatingFilter === 'unrated') {
        result = result.filter(function(o) { return !o.review || !o.review.rating; });
      }
      renderOrders(result);
    }

    // Bug 5 FIX (report14): Attach filter button event listeners
    var filterMonthBtn = document.getElementById('filter-month');
    var filterServiceBtn = document.getElementById('filter-service');
    var filterRatingBtn = document.getElementById('filter-rating');

    var monthOptions = [{value: 'all', label: 'Tất cả'}, {value: 'this_month', label: 'Tháng này'}, {value: 'last_month', label: 'Tháng trước'}];
    var monthIdx = 1; // bắt đầu = 'Tháng này'
    if (filterMonthBtn) {
      filterMonthBtn.addEventListener('click', function() {
        monthIdx = (monthIdx + 1) % monthOptions.length;
        currentMonthFilter = monthOptions[monthIdx].value;
        filterMonthBtn.childNodes[0].textContent = monthOptions[monthIdx].label + ' ';
        // Highlight nếu đang active
        if (currentMonthFilter !== 'all') {
          filterMonthBtn.className = filterMonthBtn.className.replace('bg-surface-container-low', 'bg-primary-fixed');
        } else {
          filterMonthBtn.className = filterMonthBtn.className.replace('bg-primary-fixed', 'bg-surface-container-low');
        }
        applyFilters();
      });
    }

    var serviceOptions = ['Tất cả dịch vụ'].concat(uniqueServices);
    var serviceIdx = 0;
    if (filterServiceBtn) {
      filterServiceBtn.addEventListener('click', function() {
        serviceIdx = (serviceIdx + 1) % serviceOptions.length;
        currentServiceFilter = serviceIdx === 0 ? 'all' : serviceOptions[serviceIdx];
        filterServiceBtn.childNodes[0].textContent = serviceOptions[serviceIdx] + ' ';
        if (currentServiceFilter !== 'all') {
          filterServiceBtn.className = filterServiceBtn.className.replace('bg-surface-container-low', 'bg-primary-fixed');
        } else {
          filterServiceBtn.className = filterServiceBtn.className.replace('bg-primary-fixed', 'bg-surface-container-low');
        }
        applyFilters();
      });
    }

    var ratingOptions = [{value: 'all', label: 'Đánh giá'}, {value: 'rated', label: 'Có đánh giá'}, {value: 'unrated', label: 'Chưa đánh giá'}];
    var ratingIdx = 0;
    if (filterRatingBtn) {
      filterRatingBtn.addEventListener('click', function() {
        ratingIdx = (ratingIdx + 1) % ratingOptions.length;
        currentRatingFilter = ratingOptions[ratingIdx].value;
        filterRatingBtn.childNodes[0].textContent = ratingOptions[ratingIdx].label + ' ';
        if (currentRatingFilter !== 'all') {
          filterRatingBtn.className = filterRatingBtn.className.replace('bg-surface-container-low', 'bg-primary-fixed');
        } else {
          filterRatingBtn.className = filterRatingBtn.className.replace('bg-primary-fixed', 'bg-surface-container-low');
        }
        applyFilters();
      });
    }

    // Render ban đầu: hiển thị tất cả
    currentMonthFilter = 'all';
    filterMonthBtn.childNodes[0].textContent = 'Tất cả ';
    renderOrders(allOrders);
  } catch (e) {
    hideLoading();
    console.warn('[Tasker History] Lỗi:', e.message);
    ordersList.innerHTML = '<div class="text-center py-12 text-on-surface-variant">Không thể tải lịch sử đơn hàng</div>';
  }

  // Bug 5 FIX (report13): Modal chi tiết đơn hàng cho Tasker
  function showTaskerOrderDetail(order, statusInfo, serviceName, customerName) {
    var address = order.address || 'Chưa cập nhật';
    var note = order.note || 'Không có ghi chú';
    var scheduledTime = order.scheduled_time ? formatDateTime(order.scheduled_time) : 'Chưa xác định';
    var rating = order.review ? order.review.rating : 0;
    var comment = order.review ? order.review.comment : '';
    var starStr = '';
    for (var i = 0; i < rating; i++) starStr += '⭐';

    // Remove existing modal if any
    var existingModal = document.getElementById('tasker-order-modal');
    if (existingModal) existingModal.remove();

    var overlay = document.createElement('div');
    overlay.id = 'tasker-order-modal';
    overlay.className = 'modal-overlay';
    overlay.innerHTML = '<div class="modal-box">' +
      '<div class="flex justify-between items-center mb-4">' +
      '<h2 class="text-[18px] font-bold">Chi tiết đơn hàng</h2>' +
      '<button onclick="document.getElementById(\'tasker-order-modal\').remove()" class="text-outline"><span class="material-symbols-outlined">close</span></button></div>' +
      '<div class="space-y-3">' +
      '<div class="flex justify-between"><span class="text-body-sm text-on-surface-variant">Mã đơn</span><span class="text-body-sm font-semibold">#' + order.order_id + '</span></div>' +
      '<div class="flex justify-between"><span class="text-body-sm text-on-surface-variant">Dịch vụ</span><span class="text-body-sm font-semibold">' + serviceName + '</span></div>' +
      '<div class="flex justify-between"><span class="text-body-sm text-on-surface-variant">Trạng thái</span><span class="' + statusInfo.bg + ' ' + statusInfo.text + ' px-2 py-0.5 rounded-full text-[11px] font-bold">' + statusInfo.label + '</span></div>' +
      '<div class="flex justify-between"><span class="text-body-sm text-on-surface-variant">Khách hàng</span><span class="text-body-sm font-semibold">' + customerName + '</span></div>' +
      '<div class="flex justify-between"><span class="text-body-sm text-on-surface-variant">Thời gian lên lịch</span><span class="text-body-sm font-semibold">' + scheduledTime + '</span></div>' +
      '<div class="flex justify-between"><span class="text-body-sm text-on-surface-variant">Ngày tạo</span><span class="text-body-sm font-semibold">' + formatDateTime(order.created_at) + '</span></div>' +
      '<div class="flex justify-between"><span class="text-body-sm text-on-surface-variant">Địa chỉ</span><span class="text-body-sm font-semibold text-right max-w-[180px]">' + address + '</span></div>' +
      '<div class="flex justify-between"><span class="text-body-sm text-on-surface-variant">Ghi chú</span><span class="text-body-sm text-right max-w-[180px]">' + note + '</span></div>' +
      (rating > 0 ? '<div class="bg-surface-container-low rounded-lg p-3"><p class="text-body-sm text-on-surface flex items-center gap-1"><span class="font-bold">Đánh giá:</span> <span class="text-yellow-500">' + starStr + '</span> "' + (comment || 'Tốt') + '"</p></div>' : '') +
      '<div class="pt-3 border-t border-outline-variant/30 flex justify-between items-center">' +
      '<span class="text-body-lg font-bold">Thu nhập</span>' +
      '<span class="text-[20px] font-bold text-primary">' + formatVND(order.total_price) + '</span></div>' +
      '</div>' +
      '<div class="flex gap-3 mt-4">' +
      (order.customer_id ?
        '<button onclick="window.location.href=\'chatvoikhachhang.html?orderId=' + order.order_id + '&receiverId=' + order.customer_id + '\'" class="flex-1 py-3 rounded-xl orange-gradient text-white font-bold active:scale-95 flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[18px]">chat</span>Chat khách</button>' : '') +
      '<button onclick="document.getElementById(\'tasker-order-modal\').remove()" class="flex-1 py-3 px-6 rounded-xl border-2 border-outline-variant text-on-surface-variant font-bold active:scale-95">Đóng</button></div></div>';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }
})();
</script>
