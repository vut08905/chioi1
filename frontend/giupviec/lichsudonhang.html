<script>
(async function() {
  if (!ChiOiAuth.requireAuth('dangnhaptasker.html')) return;

  var ordersList = document.querySelector('.flex.flex-col.gap-md');
  if (!ordersList) return;

  var allOrders = []; // Lưu toàn bộ orders để filter
  var currentFilter = { status: 'all', month: 'this' }; // Filter state

  var statusMap = {
    'COMPLETED': { label: 'Hoàn thành', bg: 'bg-green-100', text: 'text-green-700' },
    'IN_PROGRESS': { label: 'Đang thực hiện', bg: 'bg-blue-100', text: 'text-blue-700' },
    'PENDING': { label: 'Chờ xử lý', bg: 'bg-yellow-100', text: 'text-yellow-700' },
    'CANCELLED': { label: 'Đã hủy', bg: 'bg-red-100', text: 'text-red-700' },
    'ACCEPTED': { label: 'Đã nhận', bg: 'bg-blue-100', text: 'text-blue-700' },
    'TASKER_ARRIVED': { label: 'Đã tới nơi', bg: 'bg-blue-100', text: 'text-blue-700' }
  };

  // Helper: lấy tên dịch vụ từ API response (Prisma relation = "services" không phải "service")
  function getServiceName(order) {
    if (order.services && order.services.name) return order.services.name;
    if (order.service && order.service.name) return order.service.name;
    return 'Dịch vụ';
  }

  // Helper: lấy tên khách hàng (Prisma relation: customers.users.full_name)
  function getCustomerName(order) {
    if (order.customers && order.customers.users && order.customers.users.full_name) return order.customers.users.full_name;
    if (order.customer && order.customer.full_name) return order.customer.full_name;
    return 'Khách hàng';
  }

  showLoading();
  try {
    var orders = await apiFetch('/api/taskers/history');
    hideLoading();

    if (!orders || orders.length === 0) {
      ordersList.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-[48px] text-outline-variant">inbox</span><p class="text-on-surface-variant mt-2">Chưa có đơn hàng nào</p></div>';
      return;
    }

    allOrders = orders;
    renderOrders(allOrders);
  } catch (e) {
    hideLoading();
    console.warn('[Tasker History] Lỗi:', e.message);
    ordersList.innerHTML = '<div class="text-center py-12 text-on-surface-variant">Không thể tải lịch sử đơn hàng</div>';
  }

  // ===== Render orders list =====
  function renderOrders(filteredOrders) {
    ordersList.innerHTML = '';

    if (filteredOrders.length === 0) {
      ordersList.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-[48px] text-outline-variant">filter_list_off</span><p class="text-on-surface-variant mt-2">Không có đơn hàng phù hợp</p></div>';
      return;
    }

    filteredOrders.forEach(function(order) {
      var s = statusMap[order.status] || statusMap['PENDING'];
      var serviceName = getServiceName(order);
      var customerName = getCustomerName(order);
      var rating = order.review ? order.review.rating : 0;
      var comment = order.review ? order.review.comment : '';
      var starStr = '';
      for (var i = 0; i < rating; i++) starStr += '⭐';

      var card = document.createElement('div');
      card.className = 'order-card bg-surface-container-lowest rounded-xl p-md flex flex-col gap-3 cursor-pointer active:scale-[0.98] transition-all';
      card.innerHTML =
        '<div class="flex justify-between items-start">' +
          '<div><h3 class="text-title-sm font-title-sm text-on-surface">' + serviceName + '</h3>' +
          '<p class="text-body-sm text-on-surface-variant flex items-center gap-1 mt-1"><span class="material-symbols-outlined text-[14px]">schedule</span>' + formatDateTime(order.scheduled_time) + '</p></div>' +
          '<span class="' + s.bg + ' ' + s.text + ' px-3 py-1 rounded-full text-label-caps font-bold">' + s.label + '</span></div>' +
        '<div class="flex items-center justify-between border-t border-dashed border-outline-variant pt-3">' +
          '<span class="text-headline-md font-headline-md text-primary">' + formatVND(order.total_price) + '</span>' +
          '<div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary text-[20px]">person</span>' +
          '<span class="text-body-sm text-on-surface-variant">' + customerName + '</span></div></div>' +
        (rating > 0 ? '<div class="bg-surface-container-low rounded-lg p-3 mt-1"><p class="text-body-sm text-on-surface flex items-center gap-1 italic"><span class="text-yellow-500 font-bold tracking-tight">' + starStr + '</span>"' + (comment || 'Tốt') + '"</p></div>' : '');

      card.addEventListener('click', function() { showOrderDetail(order, s, serviceName, customerName); });
      ordersList.appendChild(card);
    });
  }

  // ===== Lỗi 3 FIX: Filter buttons =====
  var filterBtns = document.querySelectorAll('.flex.gap-sm.overflow-x-auto button');

  // Button 0: Tháng này / Tất cả
  if (filterBtns[0]) {
    filterBtns[0].addEventListener('click', function() {
      if (currentFilter.month === 'this') {
        currentFilter.month = 'all';
        filterBtns[0].innerHTML = 'Tất cả thời gian <span class="material-symbols-outlined text-[16px]">keyboard_arrow_down</span>';
        filterBtns[0].classList.add('bg-primary-fixed', 'border-primary', 'text-primary');
      } else {
        currentFilter.month = 'this';
        filterBtns[0].innerHTML = 'Tháng này <span class="material-symbols-outlined text-[16px]">keyboard_arrow_down</span>';
        filterBtns[0].classList.remove('bg-primary-fixed', 'border-primary', 'text-primary');
      }
      applyFilters();
    });
  }

  // Button 1: Tất cả dịch vụ → cycle through unique services
  var serviceNames = [];
  var currentServiceIdx = -1; // -1 = tất cả
  if (filterBtns[1]) {
    // Collect unique service names
    allOrders.forEach(function(o) {
      var name = getServiceName(o);
      if (name !== 'Dịch vụ' && serviceNames.indexOf(name) === -1) serviceNames.push(name);
    });

    filterBtns[1].addEventListener('click', function() {
      currentServiceIdx++;
      if (currentServiceIdx >= serviceNames.length) {
        currentServiceIdx = -1;
        currentFilter.service = null;
        filterBtns[1].innerHTML = 'Tất cả dịch vụ <span class="material-symbols-outlined text-[16px]">keyboard_arrow_down</span>';
        filterBtns[1].classList.remove('bg-primary-fixed', 'border-primary', 'text-primary');
      } else {
        currentFilter.service = serviceNames[currentServiceIdx];
        filterBtns[1].innerHTML = currentFilter.service + ' <span class="material-symbols-outlined text-[16px]">keyboard_arrow_down</span>';
        filterBtns[1].classList.add('bg-primary-fixed', 'border-primary', 'text-primary');
      }
      applyFilters();
    });
  }

  // Button 2: Đánh giá → toggle: tất cả / chỉ có đánh giá / chưa đánh giá
  var ratingStates = ['all', 'rated', 'unrated'];
  var ratingLabels = ['Đánh giá', 'Có đánh giá ⭐', 'Chưa đánh giá'];
  var currentRatingIdx = 0;
  if (filterBtns[2]) {
    filterBtns[2].addEventListener('click', function() {
      currentRatingIdx = (currentRatingIdx + 1) % ratingStates.length;
      currentFilter.rating = ratingStates[currentRatingIdx];
      filterBtns[2].innerHTML = ratingLabels[currentRatingIdx] + ' <span class="material-symbols-outlined text-[16px]">keyboard_arrow_down</span>';
      if (currentRatingIdx === 0) {
        filterBtns[2].classList.remove('bg-primary-fixed', 'border-primary', 'text-primary');
      } else {
        filterBtns[2].classList.add('bg-primary-fixed', 'border-primary', 'text-primary');
      }
      applyFilters();
    });
  }

  function applyFilters() {
    var filtered = allOrders.filter(function(order) {
      // Filter by month
      if (currentFilter.month === 'this') {
        var now = new Date();
        var orderDate = new Date(order.scheduled_time || order.created_at);
        if (orderDate.getMonth() !== now.getMonth() || orderDate.getFullYear() !== now.getFullYear()) return false;
      }
      // Filter by service
      if (currentFilter.service) {
        var svcName = getServiceName(order);
        if (svcName !== currentFilter.service) return false;
      }
      // Filter by rating
      if (currentFilter.rating === 'rated' && (!order.review || !order.review.rating)) return false;
      if (currentFilter.rating === 'unrated' && order.review && order.review.rating) return false;
      return true;
    });
    renderOrders(filtered);
  }

  // === Modal chi tiết đơn hàng ===
  function showOrderDetail(order, status, serviceName, customerName) {
    var existing = document.getElementById('order-detail-modal');
    if (existing) existing.remove();

    var scheduledTime = formatDateTime(order.scheduled_time);
    var address = order.address || 'Chưa cập nhật';
    var orderCode = order.order_code || '#' + order.order_id;
    var rating = order.review ? order.review.rating : 0;
    var comment = order.review ? (order.review.comment || '') : '';
    var starStr = '';
    for (var i = 0; i < 5; i++) starStr += (i < rating) ? '⭐' : '☆';

    var overlay = document.createElement('div');
    overlay.id = 'order-detail-modal';
    overlay.className = 'fixed inset-0 bg-black/40 z-[999] flex items-end justify-center';
    overlay.innerHTML =
      '<div class="bg-white rounded-t-[32px] w-full max-w-md p-6 pb-8" style="animation: slideUp 0.3s ease-out">' +
        '<div class="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-4"></div>' +
        '<h3 class="text-headline-md font-bold text-on-surface mb-4">' + serviceName + '</h3>' +
        '<div class="space-y-3">' +
          '<div class="flex items-center gap-3"><span class="material-symbols-outlined text-primary" style="font-variation-settings: \'FILL\' 1;">confirmation_number</span>' +
          '<div><p class="text-body-sm text-on-surface-variant">Mã đơn</p><p class="font-bold text-on-surface">' + orderCode + '</p></div></div>' +
          '<div class="flex items-center gap-3"><span class="material-symbols-outlined text-[#ff7e36]" style="font-variation-settings: \'FILL\' 1;">person</span>' +
          '<div><p class="text-body-sm text-on-surface-variant">Khách hàng</p><p class="font-bold text-on-surface">' + customerName + '</p></div></div>' +
          '<div class="flex items-center gap-3"><span class="material-symbols-outlined text-[#ff7e36]" style="font-variation-settings: \'FILL\' 1;">location_on</span>' +
          '<div><p class="text-body-sm text-on-surface-variant">Địa chỉ</p><p class="font-bold text-on-surface">' + address + '</p></div></div>' +
          '<div class="flex items-center gap-3"><span class="material-symbols-outlined text-[#ff7e36]" style="font-variation-settings: \'FILL\' 1;">schedule</span>' +
          '<div><p class="text-body-sm text-on-surface-variant">Thời gian</p><p class="font-bold text-on-surface">' + scheduledTime + '</p></div></div>' +
          '<div class="flex items-center justify-between border-t border-dashed border-outline-variant pt-3">' +
            '<span class="text-body-sm text-on-surface-variant">Trạng thái</span>' +
            '<span class="' + status.bg + ' ' + status.text + ' px-3 py-1 rounded-full text-label-caps font-bold">' + status.label + '</span></div>' +
          '<div class="flex items-center justify-between border-t border-dashed border-outline-variant pt-3">' +
            '<span class="text-body-sm text-on-surface-variant">Thu nhập</span>' +
            '<span class="text-headline-md font-bold text-primary">' + formatVND(order.total_price) + '</span></div>' +
          (rating > 0 ? '<div class="bg-surface-container-low rounded-xl p-3 mt-2"><p class="text-body-sm font-bold text-on-surface-variant mb-1">Đánh giá từ khách</p>' +
            '<p class="text-lg">' + starStr + '</p>' +
            (comment ? '<p class="text-body-sm text-on-surface italic mt-1">"' + comment + '"</p>' : '') + '</div>' : '') +
        '</div>' +
        '<button onclick="document.getElementById(\'order-detail-modal\').remove()" class="mt-4 w-full py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-bold active:scale-95 transition-all">Đóng</button>' +
      '</div>';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }
})();
</script>
</body></html>
