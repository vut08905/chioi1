    <div class="absolute top-1/4 right-1/4 w-32 h-32 bg-white/5 rounded-full blur-2xl"></div>

    <div class="z-10 text-center px-container-padding flex flex-col items-center anim-logo">

        <p class="text-white/80 text-[13px] mt-0.5">Dịch vụ tiện ích tại gia</p>
        
        <!-- Badge Tasker -->
        <div class="inline-flex items-center gap-1 mt-2 px-3 py-1 bg-white/20 rounded-full">
            <span class="material-symbols-outlined text-white text-[14px]" style="font-variation-settings: 'FILL' 1, 'wght' 600;">verified</span>

<!-- Main Content: Login Card — flex-1 để fill phần còn lại -->
<main class="flex-1 flex flex-col w-full max-w-md mx-auto px-5 -mt-8 z-20 relative">

    <!-- Login Card -->
    <div class="bg-white rounded-[24px] card-premium border border-surface-container/40 px-6 py-5 flex flex-col gap-4 anim-form">
        <!-- Object Selection Tabs -->
        <div class="flex justify-center border-b border-surface-container-high/30 pb-2 mb-2">
            <span class="font-title-sm text-[14px] text-primary font-bold uppercase tracking-wider">
                Dành cho Người Giúp Việc
            </span>
        </div>

        <!-- Login Form -->
        <div class="flex flex-col gap-3">
            <!-- Phone Input -->
            <div class="flex flex-col gap-1">
                <div class="relative flex items-center">
                    <span class="material-symbols-outlined absolute left-3.5 text-outline text-[20px]" data-icon="phone">phone</span>
                    <input id="phoneInput" class="w-full pl-11 pr-4 py-3 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-container transition-all text-[15px]" placeholder="Số điện thoại" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="11" autocomplete="tel"/>
                </div>
            </div>

            <!-- Password Input -->
            <div class="flex flex-col gap-1">
                <div class="relative flex items-center">
                    <span class="material-symbols-outlined absolute left-3.5 text-outline text-[20px]" data-icon="lock">lock</span>
                    <input id="passwordInput" class="w-full pl-11 pr-12 py-3 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-container transition-all text-[15px]" placeholder="Mật khẩu (8-20 ký tự)" type="password" minlength="8" maxlength="20" autocomplete="current-password"/>
                    <button id="togglePassword" class="absolute right-3.5 text-outline hover:text-on-surface-variant transition-colors">
                        <span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="eyeIcon">visibility</span>
                    </button>
                </div>
                <!-- Error Text -->
                <p id="errorMsg" class="text-error text-[12px] px-1 leading-tight" style="display:none;">
                    Sai mật khẩu. Tài khoản sẽ bị khóa 15 phút sau 5 lần nhập sai.
                </p>
                <!-- Info Text (KYC pending) -->
                <p id="infoMsg" class="text-blue-600 text-[12px] px-1 leading-tight" style="display:none;">
                    Tài khoản đang chờ Admin phê duyệt KYC.
                </p>
            </div>

            <!-- Forgot Password -->
            <div class="flex justify-end -mt-1">
                <a class="text-primary text-[13px] font-semibold hover:underline" href="quenmatkhau.html">Quên mật khẩu?</a>
            </div>
        </div>

        <!-- Login Button -->
        <button id="loginBtn" onclick="handleTaskerLogin()" class="orange-gradient w-full py-3.5 rounded-2xl shadow-lg shadow-primary-container/25 flex items-center justify-center gap-2">
            <span class="text-white text-[15px] font-bold tracking-wide">ĐĂNG NHẬP</span>
        </button>

        <!-- Register Link -->
        <p class="text-center text-[13px] text-on-surface-variant">
            Chưa có tài khoản? <a class="text-primary font-bold hover:underline" href="dangkytasker.html">Đăng ký ngay</a>
        </p>

    <!-- Footer Spacer -->
    <div class="flex-1"></div>

<script src="../shared/api.js?v=20260514"></script>
<script>
// Toggle password visibility
var toggleBtn = document.getElementById('togglePassword');
var passField = document.getElementById('passwordInput');
var eyeIcon = document.getElementById('eyeIcon');
if (toggleBtn) {
  toggleBtn.addEventListener('click', function() {
    var isHidden = passField.type === 'password';
    passField.type = isHidden ? 'text' : 'password';
    eyeIcon.textContent = isHidden ? 'visibility_off' : 'visibility';
  });
}

// TC_T01_008 FIX: Chặn khoảng trắng trong SĐT
document.getElementById('phoneInput').addEventListener('input', function(e) {
  this.value = this.value.replace(/\s/g, '').replace(/[^0-9]/g, '');
});

// TC_T01_010 FIX: Chặn khoảng trắng đầu/cuối password
document.getElementById('passwordInput').addEventListener('input', function(e) {
  if (this.value !== this.value.trim()) {
    this.value = this.value.trim();
  }
});

var isSubmitting = false;

async function handleTaskerLogin() {
  if (isSubmitting) return;
  var phone = document.getElementById('phoneInput').value.replace(/\s/g, '');
  // TC_T01_010 FIX: KHÔNG trim password - chặn ngay từ input
  var pass = document.getElementById('passwordInput').value;
  var errorEl = document.getElementById('errorMsg');
  var infoEl = document.getElementById('infoMsg');
  var loginBtn = document.getElementById('loginBtn');

  if (!phone || !pass) {
    errorEl.textContent = 'Vui lòng nhập số điện thoại và mật khẩu.';
    errorEl.style.display = 'block';
    infoEl.style.display = 'none';
    return;
  }

  // TC_T01_005 FIX: Validate định dạng SĐT trước khi gọi API
  var phoneRegex = /^0[0-9]{8,10}$/;
  if (!phoneRegex.test(phone)) {
    errorEl.textContent = 'Số điện thoại không hợp lệ. Vui lòng nhập đúng định dạng (VD: 0901234567).';
    errorEl.style.display = 'block';
    infoEl.style.display = 'none';
    return;
  }

  // TC_T01_018 FIX: Validate độ dài mật khẩu (8-20 ký tự)
  if (pass.length < 8 || pass.length > 20) {
    errorEl.textContent = 'Mật khẩu phải từ 8 đến 20 ký tự.';
    errorEl.style.display = 'block';
    infoEl.style.display = 'none';
    return;
  }

  // Disable button + show loading
  isSubmitting = true;
  loginBtn.disabled = true;
  loginBtn.innerHTML = `
      <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span class="text-white text-[15px] font-bold tracking-wide">ĐANG XỬ LÝ...</span>
  `;
  errorEl.style.display = 'none';
  infoEl.style.display = 'none';

  try {
    var data = await apiFetch('/api/auth/login', {
      method: 'POST',
      body: { phone: phone, password: pass }
    });

    // Lưu token + user info
    ChiOiAuth.saveLogin(data);

    // Chỉ cho phép TASKER đăng nhập trang này
    var user = ChiOiAuth.getUser();
    if (user && user.role === 'TASKER') {
      if (user.kyc_status && user.kyc_status === 'PENDING_APPROVAL') {
        infoEl.textContent = 'Tài khoản đang chờ Admin phê duyệt KYC.';
        infoEl.style.display = 'block';
        isSubmitting = false;
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span class="text-white text-[15px] font-bold tracking-wide">ĐĂNG NHẬP</span>';
        return;
      }
      window.location.href = 'trangchutasker.html';
    } else {
      ChiOiAuth.logout();
      errorEl.textContent = 'Tài khoản không tồn tại trong hệ thống Tasker.';
      errorEl.style.display = 'block';
      isSubmitting = false;
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<span class="text-white text-[15px] font-bold tracking-wide">ĐĂNG NHẬP</span>';
      return;
    }
  } catch (err) {
    // TC_T01_003/015/019 FIX: Phân biệt rõ loại lỗi
    var errMsg = (err.message || '').toLowerCase();
    if (!navigator.onLine || errMsg.indexOf('fetch') > -1 || errMsg.indexOf('network') > -1) {
      errorEl.textContent = 'Không có kết nối mạng. Vui lòng kiểm tra Internet và thử lại.';
    } else if (errMsg.indexOf('phiên') > -1 || errMsg.indexOf('token') > -1 || errMsg.indexOf('expired') > -1) {
      errorEl.textContent = 'Sai số điện thoại hoặc mật khẩu.';
    } else if (errMsg.indexOf('không tìm thấy') > -1 || errMsg.indexOf('not found') > -1) {
      errorEl.textContent = 'Tài khoản không tồn tại trong hệ thống.';
    } else {
      errorEl.textContent = err.message || 'Sai số điện thoại hoặc mật khẩu.';
    }
    errorEl.style.display = 'block';
    isSubmitting = false;
    loginBtn.disabled = false;
    loginBtn.innerHTML = '<span class="text-white text-[15px] font-bold tracking-wide">ĐĂNG NHẬP</span>';
  }
}

document.getElementById('passwordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleTaskerLogin();
});
document.getElementById('phoneInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('passwordInput').focus();
});
</script>
